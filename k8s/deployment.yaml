apiVersion: apps/v1
kind: Deployment
metadata:
  name: caderno
  namespace: caderno
  labels:
    app.kubernetes.io/name: caderno
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: caderno
spec:
  # SQLite + multi-replica = corrupção. 1 réplica fixa.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: caderno
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: caderno
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: caderno
    spec:
      containers:
        - name: caderno
          image: ghcr.io/alexsandroaf/projeto-caderno-nr1:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /favicon.svg
              port: http
            initialDelaySeconds: 8
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/stats
              port: http
            initialDelaySeconds: 4
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: caderno-db
