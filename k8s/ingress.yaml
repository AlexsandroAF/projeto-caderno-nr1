apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caderno
  namespace: caderno
  labels:
    app.kubernetes.io/name: caderno
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # ssl-redirect (sem o force-) respeita a exceção do path /.well-known/acme-challenge/
    # que o Let's Encrypt precisa atingir via HTTP. Após o cert ser emitido,
    # tudo é redirecionado naturalmente para HTTPS.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # privacidade: zero access log no nginx-ingress (sem IP, UA, referer ou path)
    # error_log permanece ativo para diagnóstico de falhas
    nginx.ingress.kubernetes.io/enable-access-log: "false"
    # sendBeacon envia application/json — payload pequeno, sem upload de arquivos
    nginx.ingress.kubernetes.io/proxy-body-size: "256k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - caderno.alexsandrof.com.br
      secretName: caderno-tls
  rules:
    - host: caderno.alexsandrof.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: caderno
                port:
                  name: http
